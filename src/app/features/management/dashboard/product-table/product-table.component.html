<div class="table-wrapper">
  <table mat-table [dataSource]="products" class="product-table">

    <!-- Select column -->
    <ng-container matColumnDef="select">
      <th mat-header-cell *matHeaderCellDef class="col-select">
        <mat-checkbox
          [checked]="isAllSelected()"
          [indeterminate]="selection.selected.length > 0 && !isAllSelected()"
          (change)="toggleAll()"
          aria-label="Select all products"
        />
      </th>
      <td mat-cell *matCellDef="let row" class="col-select">
        <mat-checkbox
          [checked]="selection.isSelected(row)"
          (change)="selection.toggle(row)"
          [attr.aria-label]="'Select ' + row.name"
        />
      </td>
    </ng-container>

    <!-- SKU / Name column -->
    <ng-container matColumnDef="sku">
      <th mat-header-cell *matHeaderCellDef>SKU</th>
      <td mat-cell *matCellDef="let row">
        <div class="product-cell">
          <img
            class="product-cell__img"
            [src]="row.imageUrl"
            [alt]="row.name"
            loading="lazy"
          />
          <span class="product-cell__name">{{ row.name }}</span>
        </div>
      </td>
    </ng-container>

    <!-- Buying Price column -->
    <ng-container matColumnDef="buyingPrice">
      <th mat-header-cell *matHeaderCellDef>Buying Price</th>
      <td mat-cell *matCellDef="let row">{{ formatCurrency(row.buyingPrice) }}</td>
    </ng-container>

    <!-- Selling Price column -->
    <ng-container matColumnDef="sellingPrice">
      <th mat-header-cell *matHeaderCellDef>Selling Price</th>
      <td mat-cell *matCellDef="let row">{{ formatCurrency(row.sellingPrice) }}</td>
    </ng-container>

    <!-- Current Stock column -->
    <ng-container matColumnDef="currentStock">
      <th mat-header-cell *matHeaderCellDef>Current Stock</th>
      <td mat-cell *matCellDef="let row">
        <span [class.low-stock]="row.currentStock < 5">{{ row.currentStock }}</span>
      </td>
    </ng-container>

    <!-- Stock Reorder column -->
    <ng-container matColumnDef="stockReorderStatus">
      <th mat-header-cell *matHeaderCellDef>Stock Reorder</th>
      <td mat-cell *matCellDef="let row">
        <app-status-badge [status]="row.stockReorderStatus" />
      </td>
    </ng-container>

    <!-- Actions column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        <button
          mat-icon-button
          class="more-btn"
          [matMenuTriggerFor]="rowMenu"
          [matMenuTriggerData]="{ row: row }"
          aria-label="More options"
          matTooltip="More options"
        >
          <mat-icon>more_horiz</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      class="table-row"
      [class.table-row--selected]="selection.isSelected(row)"
    ></tr>
  </table>
</div>

<!-- Shared row context menu -->
<mat-menu #rowMenu="matMenu">
  <ng-template matMenuContent let-row="row">
    <button mat-menu-item (click)="onView(row)">
      <mat-icon>visibility</mat-icon> View details
    </button>
    <button mat-menu-item (click)="onEdit(row)">
      <mat-icon>edit</mat-icon> Edit
    </button>
    <button mat-menu-item class="delete-item" (click)="onDelete(row)">
      <mat-icon>delete_outline</mat-icon> Delete
    </button>
  </ng-template>
</mat-menu>
